name: CI Tests - Push on Main

on:
  push:
    branches: ["main", "v2"] # v2 is only temporaty

jobs:
  testing_push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice imagemagick ghostscript tesseract-ocr

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Run Tests on Main Package (No Extras)
        run: make test-liteparse

      - name: Run Tests on Main Package (Extras)
        run: make test

  testing_push_mcp:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Run Tests
        run: make test
        working-directory: packages/mcp-server
