<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PdfItDown - 文件转PDF在线转换</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    PdfItDown
                </h1>
                <p class="tagline">将任何文件一键转换为PDF</p>
            </div>
        </header>

        <main class="main">
            <section class="upload-section" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" multiple accept=".docx,.xlsx,.xls,.pptx,.jpg,.jpeg,.png,.txt,.md,.html,.xml,.json,.csv" hidden>
                    <div class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <p class="upload-text">拖拽文件到此处，或点击选择文件</p>
                    <p class="upload-hint">支持格式：DOCX, XLSX, PPTX, JPG, PNG, TXT, MD, HTML 等</p>
                    <button class="btn btn-primary" id="selectFilesBtn">选择文件</button>
                </div>
            </section>

            <section class="options-section" id="optionsSection" style="display: none;">
                <div class="options-card">
                    <h3 class="options-title">转换选项</h3>
                    <div class="options-form">
                        <div class="form-group">
                            <label for="pdfTitle">PDF 标题</label>
                            <input type="text" id="pdfTitle" placeholder="留空则使用文件名" class="form-input">
                        </div>
                    </div>
                    <button class="btn btn-success btn-lg" id="startConvertBtn">开始转换</button>
                </div>
            </section>

            <section class="file-list-section" id="fileListSection" style="display: none;">
                <div class="file-list-header">
                    <h3 class="file-list-title">文件列表</h3>
                    <button class="btn btn-outline" id="clearFilesBtn">清空列表</button>
                </div>
                <div class="file-list" id="fileList">
                </div>
            </section>

            <section class="progress-section" id="progressSection" style="display: none;">
                <div class="progress-card">
                    <div class="progress-header">
                        <h3 class="progress-title">转换进度</h3>
                        <span class="progress-status" id="progressStatus">准备中...</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="totalProgressBar">
                            <div class="progress-bar-fill" id="totalProgressFill"></div>
                        </div>
                        <span class="progress-percent" id="totalProgressPercent">0%</span>
                    </div>
                    <div class="progress-stats" id="progressStats">
                    </div>
                </div>
            </section>

            <section class="results-section" id="resultsSection" style="display: none;">
                <div class="results-header">
                    <h3 class="results-title">转换结果</h3>
                    <div class="results-actions">
                        <button class="btn btn-primary" id="downloadAllBtn">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            打包下载 ZIP
                        </button>
                        <button class="btn btn-outline" id="newTaskBtn">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            新建任务
                        </button>
                    </div>
                </div>
                <div class="results-list" id="resultsList">
                </div>
            </section>
        </main>

        <footer class="footer">
            <p class="footer-text">PdfItDown - 简单、快速、免费的文件转换工具</p>
        </footer>
    </div>

    <div class="modal" id="previewModal" style="display: none;">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="previewTitle">PDF 预览</h3>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <iframe id="previewIframe" class="preview-iframe"></iframe>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
